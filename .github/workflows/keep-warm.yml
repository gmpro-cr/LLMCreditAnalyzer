name: keep-warm

# Pings both Render free-tier services so they don't sleep after ~15 min idle
# (the first request after sleep otherwise returns a 503 during cold start).
# GitHub's scheduler can lag a few minutes under load — fine for a demo.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API server
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 90 \
            https://creditguard-api.onrender.com/api/healthz
      - name: Ping Python engine
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 90 \
            https://creditguard-python.onrender.com/health
