services:
  - type: web
    name: creditguard-python
    runtime: python
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MEMO_PROVIDER
        value: gemini
      - key: EXTRACTION_PROVIDER
        value: gemini
      - key: RESEARCHER_PROVIDER
        value: gemini
