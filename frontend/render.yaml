services:
  - type: web
    name: creditguard-api
    runtime: node
    buildCommand: npm install -g pnpm@9 && pnpm install --ignore-scripts && pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PYTHON_SERVICE_URL
        value: https://creditguard-python.onrender.com
