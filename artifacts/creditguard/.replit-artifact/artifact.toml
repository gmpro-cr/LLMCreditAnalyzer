kind = "web"
previewPath = "/"
title = "CreditGuard AI"
version = "1.0.0"
id = "artifacts/creditguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24870

[services.development]
run = "pnpm --filter @workspace/creditguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creditguard", "run", "build" ]
publicDir = "artifacts/creditguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24870"
BASE_PATH = "/"
