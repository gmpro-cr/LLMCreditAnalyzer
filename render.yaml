services:
  - type: web
    name: creditguard-python
    runtime: python
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat:free
      - key: MEMO_PROVIDER
        value: openrouter
      - key: EXTRACTION_PROVIDER
        value: openrouter
      - key: RESEARCHER_PROVIDER
        value: openrouter
