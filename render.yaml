services:
  - type: web
    name: creditguard-python
    runtime: python
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MEMO_PROVIDER
        value: groq
      - key: EXTRACTION_PROVIDER
        value: groq
      - key: RESEARCHER_PROVIDER
        value: groq
